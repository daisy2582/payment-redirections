<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay via Google Pay</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #1a3a5c, #0b2545); color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .card { text-align: center; max-width: 360px; width: 100%; }
  .logo { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, #4285F4, #34A853, #FBBC05, #EA4335); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  .amount { font-size: 48px; font-weight: 800; margin: 8px 0 4px; letter-spacing: -1px; }
  .to { font-size: 13px; color: #ffffff80; margin-bottom: 4px; }
  .name { font-size: 15px; color: #ffffffcc; font-weight: 600; margin-bottom: 4px; }
  .vpa { font-size: 13px; color: #ffffff88; font-family: ui-monospace, Menlo, monospace; word-break: break-all; margin-bottom: 28px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; color: #fff; transition: transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #4285F4; box-shadow: 0 8px 20px -6px rgba(66, 133, 244, 0.6); }
  .btn-secondary { background: #ffffff15; border: 1px solid #ffffff30; }
  .hint { font-size: 12px; color: #ffffff70; margin-top: 20px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Google Pay</div>
  <div class="to">Pay to</div>
  <div class="amount" id="amt">&#8377;1</div>
  <div class="name" id="name">Dharmanth Enterprises</div>
  <div class="vpa" id="vpa">Gpay-12200742275@okbizaxis</div>

  <button type="button" id="btnCopy" class="btn btn-secondary">Copy UPI ID</button>
  <button type="button" id="btnPay" class="btn btn-primary">Open Google Pay</button>

  <div class="hint">Tap <b>Copy UPI ID</b> → <b>Open Google Pay</b> → tap Pay UPI ID → paste → enter ₹1 → pay.<br>Opening from WhatsApp/Gmail? Three-dot menu &rarr; <b>Open in Chrome</b> first.</div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  var vpa = p.get('vpa') || 'Gpay-12200742275@okbizaxis';
  var name = p.get('pn') || 'Dharmanth Enterprises';
  var am = p.get('am') || '1';
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  // Launch GPay — use UPI pay URL with empty params as the opener (guaranteed to open GPay
  // since it's a BROWSABLE intent-filter in their manifest). VPA stays empty so no validation triggers.
  var androidLaunch = 'intent://upi/pay#Intent;scheme=gpay;package=com.google.android.apps.nbu.paisa.user;end';
  var iosLaunch = 'tez://upi/pay';

  document.getElementById('amt').textContent = '₹' + am;
  document.getElementById('name').textContent = name;
  document.getElementById('vpa').textContent = vpa;

  document.getElementById('btnPay').addEventListener('click', function() {
    window.location.href = isIOS ? iosLaunch : androidLaunch;
  });

  document.getElementById('btnCopy').addEventListener('click', function() {
    var t = document.createElement('textarea');
    t.value = vpa;
    document.body.appendChild(t);
    t.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(vpa).catch(function() {});
    document.body.removeChild(t);
    var btn = document.getElementById('btnCopy');
    var orig = btn.textContent;
    btn.textContent = '✓ Copied — now open GPay';
    setTimeout(function() { btn.textContent = orig; }, 2000);
  });
})();

</script>
</body>
</html>
