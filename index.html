<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay ₹1</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #0a0f1e, #1a2542); color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .card { text-align: center; max-width: 360px; width: 100%; background: #ffffff08; border: 1px solid #ffffff1a; border-radius: 20px; padding: 32px 24px; backdrop-filter: blur(10px); }
  .logo { font-size: 22px; font-weight: 700; color: #4fc3f7; margin-bottom: 8px; letter-spacing: 0.5px; }
  .amount { font-size: 48px; font-weight: 800; margin: 12px 0 6px; }
  .to { font-size: 13px; color: #ffffff80; margin-bottom: 6px; }
  .vpa { font-size: 14px; color: #ffffffaa; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
  .spinner { width: 36px; height: 36px; border: 3px solid #ffffff20; border-top-color: #4fc3f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 24px auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: #ffffff99; font-size: 14px; margin: 8px 0 16px; min-height: 20px; }
  .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; transition: transform 0.1s ease; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: linear-gradient(135deg, #4fc3f7, #2196f3); color: #fff; }
  .btn-secondary { background: #ffffff15; color: #fff; border: 1px solid #ffffff30; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">UPI Payment</div>
  <div class="amount" id="amt">₹1</div>
  <div class="to">Pay to</div>
  <div class="vpa" id="vpa">8303265926@mairtel</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Opening UPI app…</div>
  <div id="buttons" class="hidden">
    <a class="btn btn-primary" href="#" onclick="tryOpen(0);return false;">Open UPI App</a>
    <a class="btn btn-secondary" href="#" onclick="tryOpen(1);return false;" id="btn2">PhonePe</a>
    <a class="btn btn-secondary" href="#" onclick="tryOpen(2);return false;" id="btn3">Paytm</a>
    <a class="btn btn-secondary" href="#" onclick="tryOpen(3);return false;" id="btn4">Google Pay</a>
  </div>
</div>
<script>
  var VPA = '8303265926@mairtel';
  var PAYEE_NAME = 'UPI Payment';
  var AMOUNT = '1';

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/i.test(navigator.userAgent);

  var upiParams = 'pa=' + encodeURIComponent(VPA) +
                  '&pn=' + encodeURIComponent(PAYEE_NAME) +
                  '&am=' + AMOUNT +
                  '&cu=INR' +
                  '&tn=' + encodeURIComponent('Payment');

  var genericUpi = 'upi://pay?' + upiParams;
  var phonepeLink = 'phonepe://pay?' + upiParams;
  var paytmLink = 'paytmmp://pay?' + upiParams;
  var gpayLink = 'tez://upi/pay?' + upiParams;
  var bhimLink = 'bhim://upi/pay?' + upiParams;

  var intentGeneric = 'intent://pay?' + upiParams + '#Intent;scheme=upi;end';
  var intentPhonepe = 'intent://pay?' + upiParams + '#Intent;scheme=phonepe;package=com.phonepe.app;end';
  var intentPaytm = 'intent://pay?' + upiParams + '#Intent;scheme=paytmmp;package=net.one97.paytm;end';
  var intentGpay = 'intent://pay?' + upiParams + '#Intent;scheme=tez;package=com.google.android.apps.nbu.paisa.user;end';

  var links;
  if (isIOS) {
    links = [genericUpi, phonepeLink, paytmLink, gpayLink, bhimLink];
  } else if (isAndroid) {
    links = [intentGeneric, genericUpi, intentPhonepe, intentPaytm, intentGpay];
  } else {
    links = [genericUpi];
  }

  function openLink(url) {
    if (isIOS) {
      var a = document.createElement('a');
      a.href = url;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function () { document.body.removeChild(a); }, 100);
    } else {
      window.location.href = url;
    }
  }

  var tried = 0;
  function tryOpen(index) {
    var i = (index !== undefined) ? index : tried++;
    if (i < links.length) {
      openLink(links[i]);
    }
  }

  window.onload = function () {
    document.getElementById('vpa').textContent = VPA;
    document.getElementById('amt').textContent = '₹' + AMOUNT;

    if (isIOS) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Tap below to open your UPI app';
      document.getElementById('buttons').classList.remove('hidden');
    } else if (isAndroid) {
      tryOpen();
      setTimeout(tryOpen, 2000);
      setTimeout(tryOpen, 4000);
      setTimeout(function () {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'UPI app didn’t open? Try below:';
        document.getElementById('buttons').classList.remove('hidden');
      }, 5000);
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = 'Please open this link on your mobile phone.<br>VPA: <b>' + VPA + '</b> · Amount: <b>₹' + AMOUNT + '</b>';
    }
  };
</script>
</body>
</html>
