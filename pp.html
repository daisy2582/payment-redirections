<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay via PhonePe</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a0533; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .card { text-align: center; max-width: 360px; width: 100%; }
  .logo { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, #5f259f, #7b3fe4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  .amount { font-size: 48px; font-weight: 800; margin: 8px 0 4px; letter-spacing: -1px; }
  .to { font-size: 13px; color: #ffffff80; margin-bottom: 4px; }
  .name { font-size: 15px; color: #ffffffcc; font-weight: 600; margin-bottom: 4px; }
  .vpa { font-size: 13px; color: #ffffff88; font-family: ui-monospace, Menlo, monospace; word-break: break-all; margin-bottom: 28px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; color: #fff; transition: transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: linear-gradient(135deg, #5f259f, #7b3fe4); box-shadow: 0 8px 20px -6px rgba(123, 63, 228, 0.6); }
  .btn-secondary { background: #ffffff15; border: 1px solid #ffffff30; }
  .hint { font-size: 12px; color: #ffffff70; margin-top: 20px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">PhonePe</div>
  <div class="to">Pay to</div>
  <div class="amount" id="amt">&#8377;1</div>
  <div class="name" id="name">Dharmanth Enterprises</div>
  <div class="vpa" id="vpa">Gpay-12200742275@okbizaxis</div>

  <button type="button" id="btnChat" class="btn btn-primary">Pay via PhonePe Chat</button>
  <button type="button" id="btnChatAlt" class="btn btn-secondary">Try Alt Chat Method</button>

  <div class="hint">Opening from WhatsApp/Gmail? Tap the three-dot menu &rarr; <b>Open in Chrome</b> first.</div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  var vpa = p.get('vpa') || 'Gpay-12200742275@okbizaxis';
  var name = p.get('pn') || 'Dharmanth Enterprises';
  var phone = p.get('ph') || '';
  var am = p.get('am') || '1';
  var amPaise = Math.round(parseFloat(am) * 100);
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  // Auto-extract phone from VPA if 10-digit prefix (e.g., "9876543210@ybl")
  if (!phone) {
    var vpaMatch = /^([6-9]\d{9})@/.exec(vpa);
    if (vpaMatch) phone = vpaMatch[1];
  }

  // Contact: PhoneContact if phone available, else VPAContact (schemas from decompiled PhonePe APK)
  var contact = phone
    ? {
        type: "PHONE",
        name: name,
        phoneNumber: phone,
        isOnPhonePe: true,
        isUpiEnabled: true,
        hasExternalVpa: false
      }
    : {
        type: "VPA",
        vpa: vpa,
        nickName: name,
        cbsName: name,
        isSelfVpa: false
      };

  // p2pContactChat — chat screen with Send tab + amount pre-filled
  var chatData = {
    contactInfo: contact,
    withSheetExpanded: true,
    shouldShowUnsavedBanner: false,
    shouldAutoShowKeyboard: true,
    initialTab: "SEND",
    sendParams: { initialAmount: amPaise, note: "Payment" },
    validateDestination: false
  };
  var chatB64 = btoa(JSON.stringify(chatData));

  var chatNative = 'phonepe://native?id=p2pContactChat&data=' + chatB64;
  var chatAppLink = 'https://www.phonepe.com/applink?landing_page=' + encodeURIComponent(chatNative);
  var chatIntent = 'intent://native?id=p2pContactChat&data=' + chatB64 +
    '#Intent;scheme=phonepe;package=com.phonepe.app;end';

  document.getElementById('amt').textContent = '₹' + am;
  document.getElementById('name').textContent = name;
  document.getElementById('vpa').textContent = vpa;

  document.getElementById('btnChat').addEventListener('click', function() {
    window.location.href = isIOS ? chatNative : chatIntent;
  });
  document.getElementById('btnChatAlt').addEventListener('click', function() {
    window.location.href = isIOS ? chatAppLink : chatNative;
  });
})();
</script>
</body>
</html>
