<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay via Paytm</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #00295e; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
  .card { text-align: center; max-width: 360px; width: 100%; }
  .logo { font-size: 30px; font-weight: 800; color: #00b9f5; margin-bottom: 20px; }
  .amount { font-size: 48px; font-weight: 800; margin: 8px 0 4px; letter-spacing: -1px; }
  .to { font-size: 13px; color: #ffffff80; margin-bottom: 4px; }
  .name { font-size: 15px; color: #ffffffcc; font-weight: 600; margin-bottom: 4px; }
  .vpa { font-size: 13px; color: #ffffff88; font-family: ui-monospace, Menlo, monospace; word-break: break-all; margin-bottom: 28px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; color: #fff; transition: transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #00b9f5; color: #00295e; box-shadow: 0 8px 20px -6px rgba(0, 185, 245, 0.5); }
  .btn-secondary { background: #ffffff15; border: 1px solid #ffffff30; color: #fff; }
  .hint { font-size: 12px; color: #ffffff70; margin-top: 20px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Paytm</div>
  <div class="to">Pay to</div>
  <div class="amount" id="amt">&#8377;1</div>
  <div class="name" id="name">Dharmanth Enterprises</div>
  <div class="vpa" id="vpa">Gpay-12200742275@okbizaxis</div>

  <button type="button" id="btnChat" class="btn btn-primary">Pay via Paytm Chat</button>
  <button type="button" id="btnChatAlt" class="btn btn-secondary">Try Alt Chat (Intent)</button>

  <div class="hint">Opening from WhatsApp/Gmail? Tap the three-dot menu &rarr; <b>Open in Chrome</b> first.</div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  var vpa = p.get('vpa') || 'Gpay-12200742275@okbizaxis';
  var name = p.get('pn') || 'Dharmanth Enterprises';
  var phone = p.get('ph') || '';
  var am = p.get('am') || '1';

  // Auto-extract phone from VPA if 10-digit prefix
  if (!phone) {
    var vpaMatch = /^([6-9]\d{9})@/.exec(vpa);
    if (vpaMatch) phone = vpaMatch[1];
  }

  // UPI pay with merchant flags — skips p2p pre-validation
  // mode=02 (merchant), mc=0000 (generic MCC), tr=unique ref
  var txnRef = 'TXN' + Date.now() + Math.floor(Math.random() * 1000);
  var upiParams = 'pa=' + encodeURIComponent(vpa) +
    '&pn=' + encodeURIComponent(name) +
    '&am=' + parseFloat(am).toFixed(2) +
    '&cu=INR' +
    '&mode=02' +
    '&mc=0000' +
    '&tr=' + txnRef +
    '&tn=' + encodeURIComponent('Payment');

  var chatLink = 'paytmmp://pay?' + upiParams;
  var chatIntent = 'intent://pay?' + upiParams +
    '#Intent;scheme=paytmmp;package=net.one97.paytm;end';

  document.getElementById('amt').textContent = '₹' + am;
  document.getElementById('name').textContent = name;
  document.getElementById('vpa').textContent = vpa;

  document.getElementById('btnChat').addEventListener('click', function() {
    window.location.href = chatLink;
  });
  document.getElementById('btnChatAlt').addEventListener('click', function() {
    window.location.href = chatIntent;
  });
})();
</script>
</body>
</html>
