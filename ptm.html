<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay via Paytm</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #00295e; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { text-align: center; max-width: 320px; padding: 0 16px; }
  .logo { font-size: 28px; font-weight: 800; color: #00b9f5; margin-bottom: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ffffff20; border-top-color: #00b9f5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: #ffffff80; font-size: 14px; margin: 8px 0; }
  .amount { font-size: 36px; font-weight: 800; margin: 8px 0; }
  .to { font-size: 13px; color: #ffffff60; }
  .vpa { font-size: 13px; color: #ffffffaa; font-family: ui-monospace, Menlo, monospace; word-break: break-all; margin-top: 4px; }
  .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; }
  .btn-primary { background: #00b9f5; color: white; }
  .btn-secondary { background: #ffffff15; color: #fff; border: 1px solid #ffffff30; }
  .hidden { display: none; }
</style>
<script>
  var p = new URLSearchParams(window.location.search);
  var vpa = p.get('vpa') || '8303265926@mairtel';
  var name = p.get('pn') || 'UPI Payment';
  var am = p.get('am') || '1';
  var tn = p.get('tn') || 'TXN' + Date.now();

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  var upiParams = 'pa=' + encodeURIComponent(vpa) +
                  '&pn=' + encodeURIComponent(name) +
                  '&am=' + parseFloat(am).toFixed(2) +
                  '&cu=INR' +
                  '&tn=' + encodeURIComponent(tn);

  var paytmLink = 'paytmmp://pay?' + upiParams;
  var paytmCashWallet = 'paytmmp://cash_wallet?featuretype=money_transfer&' + upiParams;
  var upiLink = 'upi://pay?' + upiParams;
  var intentPaytm = 'intent://pay?' + upiParams + '#Intent;scheme=upi;package=net.one97.paytm;end';
  var intentGeneric = 'intent://pay?' + upiParams + '#Intent;scheme=upi;end';

  var links;
  if (isIOS) {
    links = [paytmLink, upiLink];
  } else {
    links = [intentPaytm, paytmLink, paytmCashWallet, intentGeneric, upiLink];
  }

  var tried = 0;
  function tryOpen() {
    if (tried < links.length) {
      window.location.href = links[tried];
      tried++;
    }
  }

  window.onload = function() {
    document.getElementById('amt').textContent = '₹' + am;
    document.getElementById('vpa').textContent = vpa;

    tryOpen();
    setTimeout(tryOpen, 2000);
    setTimeout(tryOpen, 4000);
    if (!isIOS) setTimeout(tryOpen, 6000);

    setTimeout(function() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Paytm did not open automatically';
      document.getElementById('buttons').classList.remove('hidden');
    }, 5000);
  };
</script>
</head>
<body>
<div class="card">
  <div class="logo">Paytm</div>
  <div class="amount" id="amt">&#8377;1</div>
  <div class="to">Pay to</div>
  <div class="vpa" id="vpa">8303265926@mairtel</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Opening Paytm...</div>
  <div id="buttons" class="hidden">
    <a class="btn btn-primary" href="#" onclick="tried=0;tryOpen();return false;">Open Paytm</a>
    <a class="btn btn-secondary" href="#" onclick="window.location.href=upiLink;return false;">Open Any UPI App</a>
  </div>
</div>
</body>
</html>
